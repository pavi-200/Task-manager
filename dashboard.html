<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h1>Task Manager Dashboard</h1>

<hr>

<h3>Total: <span id="totalTasks">0</span></h3>

<h3>Completed: <span id="completedTasks">0</span></h3>

<h3>Pending: <span id="pendingTasks">0</span></h3>

<hr>

<input
id="search"
class="form-control mb-2"
placeholder="Search Tasks"
onkeyup="searchTasks()">

<input
id="taskTitle"
class="form-control mb-2"
placeholder="Task Title">

<select
id="priority"
class="form-control mb-2">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<input
type="date"
class="form-control mb-2">

<button
class="btn btn-dark"
onclick="addTask()">

Add Task

</button>

<hr>

<table class="table table-bordered">

<thead>

<tr>
<th>Task</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="taskList">

</tbody>

</table>

<a href="index.html" class="btn btn-danger">
Logout
</a>

</div>

<script src="script.js"></script>

</body>
</html>
